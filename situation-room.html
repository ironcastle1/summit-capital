<!DOCTYPE html>
<html>
<head>
<title>Situation Room - Summit Capital</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0d0d0d;
  color:#fff;
}

.header {
  padding:12px;
  text-align:center;
  background:#111;
  font-weight:bold;
}

#map {
  height:60vh;
  width:100%;
}

.panel {
  padding:15px;
}

.item {
  background:#151515;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">SUMMIT CAPITAL — SITUATION ROOM</div>

<div id="map"></div>

<div class="panel" id="intel"></div>

<script>
// -------- MAP --------
function initMap() {

  const map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 20, lng: 0 },
    zoom: 2,
    styles: [
      { elementType: "geometry", stylers: [{ color: "#0d0d0d" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#0d0d0d" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#888" }] }
    ]
  });

  const events = [
    {lat:40.7,lng:-74.0,title:"US Market Volatility"},
    {lat:51.5,lng:-0.1,title:"London M&A Activity"},
    {lat:35.7,lng:139.7,title:"Japan Policy Hold"},
    {lat:29.9,lng:32.5,title:"Suez Disruption"},
    {lat:25.2,lng:55.3,title:"Gulf Capital Deployment"}
  ];

  events.forEach(e => {
    const marker = new google.maps.Marker({
      position: {lat:e.lat, lng:e.lng},
      map: map,
      title: e.title
    });

    const info = new google.maps.InfoWindow({
      content: `<div style="color:#000">${e.title}</div>`
    });

    marker.addListener("click", () => {
      info.open(map, marker);
    });
  });
}

// -------- INTEL FEED --------
function loadIntel(){
  const intel = [
    "Fed signalling rate pause",
    "Energy markets stabilising",
    "AI stocks accelerating growth",
    "Shipping routes disrupted globally"
  ];

  const container = document.getElementById("intel");
  container.innerHTML = "";

  intel.forEach(i=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText = i;
    container.appendChild(div);
  });
}

loadIntel();
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6zKmCvtD3rU7yEhFJjP5bZf0-16A9vm8&callback=initMap">
</script>

</body>
</html>
