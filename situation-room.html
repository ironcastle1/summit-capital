<script>
let map;
let markers = [];
let activeLayer = "all";

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 20, lng: 0 },
    zoom: 2,
    styles: [
      { elementType: "geometry", stylers: [{ color: "#020508" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#020508" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#3a5570" }] }
    ],
    disableDefaultUI: true
  });

  renderMarkers();
  document.getElementById("evtbadge").innerText = EVENTS.length + " EVENTS";
}

function renderMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];

  EVENTS.forEach(ev => {
    if (activeLayer !== "all" && ev.type !== activeLayer) return;

    const marker = new google.maps.Marker({
      position: { lat: ev.lat, lng: ev.lng },
      map: map,
      title: ev.title
    });

    const infowindow = new google.maps.InfoWindow({
      content: `
        <div class="pop-wrap">
          <div class="pop-region">${ev.region}</div>
          <div class="pop-title">${ev.title}</div>
          <div class="pop-body">${ev.body}</div>
        </div>
      `
    });

    marker.addListener("click", () => {
      infowindow.open(map, marker);
    });

    markers.push(marker);
  });
}

function setLayer(layer, el) {
  activeLayer = layer;
  document.querySelectorAll(".mf").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderMarkers();
}

function setMapType(type) {
  map.setMapTypeId(type);
  document.querySelectorAll(".mt-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-" + type).classList.add("active");
}

function toggleSide() {
  document.getElementById("side").classList.toggle("open");
}

function sw(tab) {
  document.querySelectorAll(".ss").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".stab").forEach(s => s.classList.remove("active"));

  document.getElementById("ss-" + tab).classList.add("active");
  document.getElementById("stab-" + tab).classList.add("active");
}
</script>
