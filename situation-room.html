*{ box-sizing: border-box; }

body {
  margin: 0;

  color: #e6e6e6;
  overflow-x: hidden;
}

.header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 10px 40px 4px 40px;
}

.cred-left,
.cred-right {
  font-size: 13px;
  opacity: 0.75;
  display: flex;
  gap: 20px;
}

.cred-right { justify-content: flex-end; }

.logo-zone {
  text-align: center;
  position: relative;
}

.logo-zone::before {
  content: "";
  position: absolute;
  top: -25px;
  left: 50%;
  transform: translateX(-50%);
  width: 420px;
  height: 260px;
  background: radial-gradient(circle, rgba(255,215,120,0.20), transparent 70%);
  filter: blur(40px);
  pointer-events: none;
}

.logo {
  width: 240px;
  position: relative;
  animation: shimmer 5s infinite linear;
}

@keyframes shimmer {
  0%   { filter: brightness(1); }
  50%  { filter: brightness(1.15); }
  100% { filter: brightness(1); }
}

.divider {
  height: 1px;
  background: #1a1a1a;
  margin-top: 6px;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 40px;
  font-size: 13px;
  opacity: 0.6;
  border-bottom: 1px solid #141414;
}

.breadcrumb a {
  color: #e6e6e6;
  text-decoration: none;
}

.breadcrumb a:hover { opacity: 1; text-decoration: underline; }
.breadcrumb span { opacity: 0.4; }

#situation-root {
  width: 100%;
  height: calc(100vh - 120px);
  min-height: 600px;
  position: relative;
}

.telegram-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #0a0a0a;
  border-top: 1px solid #1f1f1f;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  padding: 12px;
  z-index: 9999;
}

.telegram-bar a {
  background: #229ED9;
  color: white;
  padding: 10px 24px;
  text-decoration: none;
  border-radius: 4px;
  font-weight: 600;
  font-size: 13px;
}

.stats-bottom {
  font-size: 12px;
  opacity: 0.7;
}

@media(max-width: 900px) {
  .logo { width: 180px; }
  .header {
    grid-template-columns: 1fr;
    text-align: center;
    gap: 10px;
  }
  .cred-left, .cred-right { justify-content: center; }
  .breadcrumb { padding: 8px 16px; }
  #situation-root { height: calc(100vh - 130px); }
}

#situation-root * { box-sizing: border-box; }

@keyframes sr-pulse    { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes sr-ticker   { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@keyframes sr-nfade    { 0%{opacity:0;transform:translateY(6px)} 20%{opacity:1;transform:translateY(0)} 80%{opacity:1} 100%{opacity:0} }
@keyframes sr-spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

#situation-root ::-webkit-scrollbar { width: 2px; }
#situation-root ::-webkit-scrollbar-thumb { background: #1a4080; }

async function callClaude(systemPrompt, userPrompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:systemPrompt,
      messages:[{role:"user",content:userPrompt}],
      tools:[{type:"web_search_20250305",name:"web_search"}]
    })
  });
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

async function fetchLiveIntel(topic="all") {
  const topicMap={
    all:"breaking geopolitical news, gold, bitcoin, oil, energy, wars, defence, macro markets",
    crypto:"Bitcoin BTC ETF, Ethereum, Solana, crypto markets",
    metals:"gold price, silver, copper, platinum, uranium",
    oil:"Brent crude, WTI, OPEC, Saudi Arabia, natural gas, LNG, Red Sea",
    war:"Ukraine Russia war, Gaza Middle East, Sudan, DRC conflict",
    defence:"Rheinmetall, Lockheed, Raytheon, BAE, Saab, NATO defence stocks",
    macro:"Federal Reserve, inflation, dollar DXY, tariffs, trade war",
  };
  const focus=topicMap[topic]||topicMap.all;
  const today=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const system=`You are a financial intelligence analyst for Summit Capital. Today is ${today}.
Use web_search to find the LATEST news before responding.
Respond ONLY with a JSON array. No preamble, no markdown, no backticks.
Each object: headline (max 120 chars with real numbers), cat (breaking|market|crypto|metals|oil|war|defence|geo|energy|macro), sentiment (bullish|bearish|critical|neutral), source (e.g. Reuters), search (3-5 word Google search), time (e.g. 2h ago).`;
  const user=`Search for the LATEST breaking news right now on: ${focus}. Return exactly 8 items as a JSON array.`;
  try {
    const raw=await callClaude(system,user);
    const clean=raw.replace(/```json|```/g,"").trim();
    const s=clean.indexOf("["),e=clean.lastIndexOf("]");
    if(s===-1||e===-1) throw new Error("No array");
    return JSON.parse(clean.slice(s,e+1)).slice(0,8);
  } catch(err) { console.error(err); return null; }
}

  const today=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const system=`You are a market data terminal. Today is ${today}. Use web_search to find CURRENT prices.
Respond ONLY with a JSON array. No preamble, no markdown, no backticks.
Each object: { sym, name, price (number), prev (number), cat } where cat is crypto|metal|commodity|defence.`;
  const user=`Search current prices for: Bitcoin, Ethereum, Solana, XRP, Gold, Silver, Copper, Platinum, Brent Crude, WTI Crude, Natural Gas, Wheat, Lockheed Martin, RTX Corp, Rheinmetall, Boeing. Return as JSON array.`;
  try {
    const raw=await callClaude(system,user);
    const clean=raw.replace(/```json|```/g,"").trim();
    const s=clean.indexOf("["),e=clean.lastIndexOf("]");
    if(s===-1||e===-1) throw new Error("No array");
    return JSON.parse(clean.slice(s,e+1));
  } catch(err) { console.error(err); return null; }
}

function WorldMap({layer,onCountryClick,showRoutes,showBRI}) {
  const svgRef=useRef(null);
  const gRef=useRef(null);
  const [world,setWorld]=useState(null);
  const [zoomK,setZoomK]=useState(1);
  const zoomRef=useRef(null);

  useEffect(()=>{
    if(!window.d3||!window.topojson) return;
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(r=>r.json()).then(setWorld).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(!svgRef.current||!window.d3) return;
    const d3=window.d3;
    const svg=d3.select(svgRef.current);
    const zoom=d3.zoom().scaleExtent([0.5,150]).on("zoom",(event)=>{
      if(gRef.current){ d3.select(gRef.current).attr("transform",event.transform); setZoomK(event.transform.k); }
    });
    svg.call(zoom).on("dblclick.zoom",null);
    zoomRef.current=zoom;
    svg.on("click",(e)=>{ if(e.target===svgRef.current) onCountryClick(null); });
  },[]);

  const zoomIn=()=>{ if(zoomRef.current&&svgRef.current) window.d3.select(svgRef.current).transition().duration(300).call(zoomRef.current.scaleBy,1.6); };
  const zoomOut=()=>{ if(zoomRef.current&&svgRef.current) window.d3.select(svgRef.current).transition().duration(300).call(zoomRef.current.scaleBy,0.625); };
  const reset=()=>{ if(zoomRef.current&&svgRef.current) window.d3.select(svgRef.current).transition().duration(500).call(zoomRef.current.transform,window.d3.zoomIdentity); };

  if(!window.d3||!window.topojson) return (
    <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#040a10"}}>
      <div style={{fontFamily:"Orbitron,monospace",fontSize:10,color:G,letterSpacing:3}}>LOADING GLOBE...</div>
    </div>
  );

  const d3=window.d3,topojson=window.topojson;
  const W2=svgRef.current?svgRef.current.clientWidth||900:900;
  const H2=svgRef.current?svgRef.current.clientHeight||500:500;
  const proj=d3.geoNaturalEarth1().scale(W2/6.2).translate([W2/2,H2/2]);
  const pathGen=d3.geoPath().projection(proj);
  let countries=null,borders=null;
  if(world&&topojson){
    try{ countries=topojson.feature(world,world.objects.countries); borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b); }catch(e){}
  }

  function countryFill(id){
    const n=+id;
    if([840,124].includes(n)) return "#2a6b8a";
    if(n===484) return "#2a7a6a";
    if([36,554].includes(n)) return "#2a5a7a";
    if([276,250,724,380,620,528,56,756,40,203,616,348,642,804,100,300,191,703,705,8,440,428,372,208,578,246,752].includes(n)) return "#1e4060";
    if(n===643) return "#1e3d6a";
    if([682,368,364,400,760,887,512,414,634,784,422,376].includes(n)) return "#6a5a2a";
    if([156,392,410,408].includes(n)) return "#2a5a3a";
    if([356,360,458,704,764,116,418,104,50,524,586,144,608].includes(n)) return "#2a5535";
    if([818,434,788,12,504].includes(n)) return "#7a6a3a";
    if([566,288,686,324].includes(n)) return "#3a5a1a";
    if([710,516,716,894,508].includes(n)) return "#4a5a1a";
    if([180,24,120,266,178].includes(n)) return "#2a5a1a";
    return "#3a5a1a";
  }

  const briRoutes=[
    {coords:[[121.5,31.2],[103.8,1.3],[80.2,13.1],[55.9,25.8],[43.2,11.6],[18.4,-33.9],[4.5,51.9]],w:1.8,speed:10,label:"MARITIME SILK ROAD",from:"China (Shanghai)",to:"Europe (Rotterdam)",cargo:"Electronics, machinery, consumer goods",notes:"China primary maritime export corridor. Passes through Malacca Strait, Indian Ocean, Red Sea (currently disrupted), Suez Canal."},
    {coords:[[121.5,31.2],[116.4,39.9],[87.6,43.8],[69.2,41.3],[37.6,55.8],[4.5,51.9]],w:1.5,speed:8,label:"EURASIA RAIL",from:"China (Chongqing)",to:"Europe (Hamburg)",cargo:"Electronics, automotive parts",notes:"Rail freight 3x faster than sea. 15,000km across Kazakhstan, Russia, Poland."},
    {coords:[[103.8,30.7],[76.8,34.1],[67.0,25.4],[58.6,23.6]],w:1.4,speed:9,label:"CPEC",from:"China (Kashgar)",to:"Pakistan (Gwadar)",cargo:"Energy equipment, machinery",notes:"$62B investment. Gives China Indian Ocean access bypassing Malacca."},
  ];

  const tradeRoutes=[
    {coords:[[-74,40.7],[4.5,51.9]],color:"#00e5ff",w:1.4,type:"container",label:"TRANS-ATLANTIC",from:"USA (New York)",to:"Europe (Rotterdam)",cargo:"Manufactured goods",notes:"Busiest high-value route. Dominated by Maersk, MSC, Hapag-Lloyd."},
    {coords:[[103.8,1.3],[43.5,12],[32.5,29.9],[4.5,51.9]],color:"#ff3344",w:0.8,type:"restricted",label:"SUEZ (DISRUPTED)",from:"Asia",to:"Europe",cargo:"Containers — DISRUPTED",notes:"HOUTHI ATTACKS: 42% throughput reduction. Each ship adds ~$1M cost and 14 days."},
    {coords:[[103.8,1.3],[18.4,-33.9],[-10,0],[4.5,51.9]],color:"#00ff88",w:1.8,type:"container",label:"CAPE DIVERSION",from:"Asia (Singapore)",to:"Europe via Cape",cargo:"All containerised cargo",notes:"400% volume surge since Suez disruption. Cape Town bunkering at capacity."},
    {coords:[[55.9,25.8],[103.8,1.3],[114.2,22.3]],color:"#ff8800",w:2.3,type:"oil",label:"GULF-ASIA OIL",from:"Saudi Arabia, Iraq, Kuwait, UAE",to:"China, Japan, Korea, India",cargo:"Crude oil — 20M bbl/day",notes:"World most critical energy corridor. Any Iran escalation threatens this route."},
    {coords:[[-74,40.7],[-79.5,9],[-118.3,33.7]],color:"#c9a84c",w:1.2,type:"container",label:"PANAMA CANAL",from:"US East Coast",to:"US West Coast + Asia",cargo:"Consumer goods",notes:"CONSTRAINED: Drought reduced capacity 30%."},
    {coords:[[103.8,1.3],[139.7,35.7],[-118.3,33.7]],color:"#00e5ff",w:2.5,type:"container",label:"TRANS-PACIFIC",from:"China, Japan, Korea, SE Asia",to:"USA (Los Angeles)",cargo:"Electronics, consumer goods",notes:"World highest volume containerised trade lane. China alone accounts for 40%."},
    {coords:[[55.9,25.8],[4.5,51.9]],color:"#ff8800",w:1.3,type:"oil",label:"GULF-EUROPE LNG",from:"Qatar, UAE, Saudi Arabia",to:"Europe (Rotterdam)",cargo:"LNG, crude oil",notes:"Qatar LNG replacing Russian pipeline gas."},
    {coords:[[18.1,59.3],[37.6,55.8]],color:"#ff3344",w:0.7,type:"restricted",label:"BALTIC (RESTRICTED)",from:"Baltic states",to:"Russia",cargo:"SEVERELY RESTRICTED",notes:"NATO sanctions have closed Baltic commercial routes."},
  ];

  const visibleEvents=layer==="all"?EVENTS:EVENTS.filter(e=>e.type===layer);

  return (
    <div style={{width:"100%",height:"100%",position:"relative",background:"#040a10",overflow:"hidden"}}>
      <svg ref={svgRef} style={{width:"100%",height:"100%",display:"block",cursor:"grab"}}>
        <g ref={gRef}>
          <rect x="-10000" y="-10000" width="30000" height="30000" fill="#0a1628"/>
          {countries&&countries.features.map(f=>(
            <path key={f.id} d={pathGen?pathGen(f)||"":""} fill={countryFill(f.id)} stroke="#1a2a3a" strokeWidth={0.4/Math.max(zoomK,1)}
              style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();const n=COUNTRY_NAMES[+f.id];if(n) onCountryClick({type:"country",name:n,x:e.clientX,y:e.clientY});}}/>
          ))}
          {borders&&<path d={pathGen?pathGen(borders)||"":""} fill="none" stroke="#1e3050" strokeWidth={0.3/Math.max(zoomK,1)}/>}
          {countries&&proj&&zoomK>=1.2&&countries.features.map(f=>{
            const name=COUNTRY_NAMES[+f.id]; if(!name) return null;
            try{
              const ov=CENTROID_OVERRIDES[+f.id];
              let cx,cy;
              if(ov){const pt=proj(ov);if(!pt||isNaN(pt[0]))return null;[cx,cy]=pt;}
              else{const c=d3.geoCentroid(f);if(!c)return null;const pt=proj(c);if(!pt||isNaN(pt[0]))return null;[cx,cy]=pt;}
              const fs=Math.max(4.5,Math.min(8,6/zoomK*2));
              return(
                <g key={"l"+f.id} transform={"translate("+cx+","+cy+")"} style={{pointerEvents:"none"}}>
                  <g transform={"scale("+(1/zoomK)+")"}>
                    <text textAnchor="middle" dominantBaseline="middle" fill="#9ac8e0" fontSize={fs}
                      fontFamily="Share Tech Mono,monospace" opacity={Math.min(1,(zoomK-0.8)*1.8)}
                      stroke="rgba(2,8,16,0.92)" strokeWidth="2.5" paintOrder="stroke">
                      {name.toUpperCase()}
                    </text>
                  </g>
                </g>
              );
            }catch(e){return null;}
          })}
          {proj&&zoomK>=3&&CITIES.map((city,i)=>{
            const pt=proj([city.lng,city.lat]);
            if(!pt||isNaN(pt[0])||isNaN(pt[1])) return null;
            return(
              <g key={"c"+i} transform={"translate("+pt[0]+","+pt[1]+")"} style={{pointerEvents:"none"}}>
                <g transform={"scale("+(1/zoomK)+")"}>
                  <circle r="2" fill="#3a7aa0" opacity="0.8"/>
                  <text x="4" y="-2" fill="#5a9ab8" fontSize="5" fontFamily="Share Tech Mono,monospace" opacity="0.8" stroke="rgba(2,8,16,0.9)" strokeWidth="2" paintOrder="stroke">{city.name}</text>
                </g>
              </g>
            );
          })}
          {showRoutes&&proj&&tradeRoutes.map((r,i)=>{
            const line={type:"LineString",coordinates:r.coords};
            const d=pathGen?pathGen(line):null; if(!d) return null;
            const seg=r.type==="restricted"?6:r.type==="oil"?18:20,gap=r.type==="restricted"?4:8,tot=seg+gap;
            const mp=r.coords[Math.floor(r.coords.length/2)];
            const mpProj=mp?proj(mp):null;
            return(
              <g key={"tr"+i} style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onCountryClick({type:"route",route:r,isBRI:false,x:e.clientX,y:e.clientY});}}>
                <path d={d} fill="none" stroke={r.color} strokeWidth={r.w+1.5} opacity="0.12"/>
                <path d={d} fill="none" stroke={r.color} strokeWidth={r.w} opacity="0.55"/>
                <path d={d} fill="none" stroke={r.color} strokeWidth={r.w*0.7} opacity="0.9" strokeDasharray={seg+" "+gap} strokeLinecap="round">
                  <animate attributeName="stroke-dashoffset" from="0" to={"-"+tot} dur="30s" repeatCount="indefinite"/>
                </path>
                <path d={d} fill="none" stroke="transparent" strokeWidth="14"/>
                {mpProj&&<g transform={"translate("+mpProj[0]+","+mpProj[1]+")"}>
                  <g transform={"scale("+(1/zoomK)+")"}>
                    <rect x="-2" y="-9" width={r.label.length*4.3+4} height="12" fill="rgba(2,8,16,0.85)" rx="1"/>
                    <text fill={r.color} fontSize="6.5" fontFamily="Share Tech Mono,monospace">{r.label}</text>
                  </g>
                </g>}
              </g>
            );
          })}
          {showBRI&&proj&&briRoutes.map((r,i)=>{
            const line={type:"LineString",coordinates:r.coords};
            const d=pathGen?pathGen(line):null; if(!d) return null;
            const mp=r.coords[Math.floor(r.coords.length/2)];
            const mpProj=proj?proj(mp):null;
            const seg=16,gap=7,tot=seg+gap;
            return(
              <g key={"bri"+i} style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onCountryClick({type:"route",route:r,isBRI:true,x:e.clientX,y:e.clientY});}}>
                <path d={d} fill="none" stroke="#ff9900" strokeWidth={r.w+2} opacity="0.1"/>
                <path d={d} fill="none" stroke="#ff9900" strokeWidth={r.w} opacity="0.5"/>
                <path d={d} fill="none" stroke="#ff9900" strokeWidth={r.w*0.65} opacity="0.95" strokeDasharray={seg+" "+gap} strokeLinecap="round">
                  <animate attributeName="stroke-dashoffset" from="0" to={"-"+tot} dur="11s" repeatCount="indefinite"/>
                </path>
                <path d={d} fill="none" stroke="transparent" strokeWidth="12"/>
                {mpProj&&<g transform={"translate("+mpProj[0]+","+mpProj[1]+")"}>
                  <g transform={"scale("+(1/zoomK)+")"}>
                    <rect x="-2" y="-9" width={r.label.length*4.2+4} height="12" fill="rgba(2,8,16,0.85)" rx="1"/>
                    <text fill="#ff9900" fontSize="6.5" fontFamily="Share Tech Mono,monospace">{r.label}</text>
                  </g>
                </g>}
              </g>
            );
          })}
          {proj&&PORTS.map((p,i)=>{
            const pt=proj([p.lng,p.lat]); if(!pt) return null;
            const sz=8;
            return(
              <g key={"p"+i} transform={"translate("+pt[0]+","+pt[1]+")"} style={{cursor:"pointer"}}
                onClick={e=>{e.stopPropagation();onCountryClick({type:"port",port:p,x:e.clientX,y:e.clientY});}}>
                <g transform={"scale("+(1/zoomK)+")"}>
                  <circle r={sz+5} fill={C} opacity="0.12"/>
                  <rect x={-sz/2} y={-sz/2} width={sz} height={sz} fill={C} opacity="0.85" stroke="rgba(0,0,0,0.5)" strokeWidth="0.8" transform="rotate(45)"/>
                  <text x={sz+2} y="-2" fill={C} fontSize="7.5" fontFamily="Share Tech Mono,monospace" opacity="0.9">{p.name}</text>
                  <text x={sz+2} y="7" fill={C} fontSize="6" fontFamily="Share Tech Mono,monospace" opacity="0.7">{p.status}</text>
                </g>
              </g>
            );
          })}
          {proj&&visibleEvents.map((ev,i)=>{
            const pt=proj([ev.lng,ev.lat]);
            if(!pt||isNaN(pt[0])||isNaN(pt[1])) return null;
            const col=TC[ev.type]||"#fff";
            return(
              <g key={"ev"+i} transform={"translate("+pt[0]+","+pt[1]+")"} style={{cursor:"pointer"}}
                onClick={e=>{e.stopPropagation();onCountryClick({type:"event",event:ev,x:e.clientX,y:e.clientY});}}>
                <g transform={"scale("+(1/zoomK)+")"}>
                  <circle r="10" fill={col} opacity="0.08">
                    <animate attributeName="r" values="6;14;6" dur="2.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.15;0;0.15" dur="2.5s" repeatCount="indefinite"/>
                  </circle>
                  <circle r="4" fill={col} opacity="0.9"/>
                  <circle r="1.5" fill="#fff" opacity="0.9"/>
                </g>
              </g>
            );
          })}
        </g>
      </svg>
      <div style={{position:"absolute",top:10,left:10,display:"flex",flexDirection:"column",gap:4,zIndex:50}}>
        {[["+",zoomIn],["-",zoomOut],["H",reset]].map(([lbl,fn])=>(
          <div key={lbl} onClick={fn} style={{background:"rgba(4,9,16,0.93)",border:"1px solid #1a4080",color:G,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontFamily:"Orbitron,monospace",fontSize:10,borderRadius:2}}>{lbl}</div>
        ))}
      </div>
    </div>
  );
}

  const [prices,setPrices]=useState(STATIC_PRICES.map(p=>({...p})));

  const sentColors={bullish:"#00ff88",bearish:"#ff3344",critical:"#ff0044",neutral:"#a8c4d4"};

  const loadFeed=useCallback(async(topic)=>{
    setFeedLoading(true);setFeedError(null);

    if(data&&data.length>0){
      setLiveFeed(data);
      setLastRefresh(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
    } else {
      setFeedError("Could not fetch live intel. Check connection.");
    }
    setFeedLoading(false);
  },[]);

  const loadPrices=useCallback(async()=>{
    setPricesLoading(true);
    const data=await fetchLivePrices();
    if(data&&data.length>0){
      setPrices(data.map(p=>({...p,price:typeof p.price==="number"?p.price:parseFloat(p.price)||0,prev:typeof p.prev==="number"?p.prev:parseFloat(p.prev)||0})));
      setPricesLive(true);
    }
    setPricesLoading(false);
  },[]);

  useEffect(()=>{
    const check=()=>setIsMobile(window.innerWidth<680);
    check();window.addEventListener("resize",check);
    loadFeed("all");
    loadPrices();
    return()=>window.removeEventListener("resize",check);
  },[]);

  useEffect(()=>{

    const t=setInterval(()=>setPrices(p=>p.map(c=>({...c,price:+(c.price*(1+(Math.random()-0.5)*0.0008)).toFixed(c.price>100?2:c.price>1?3:5)}))),2000);

                          <div key={c.sym} style={{background:"#0a1220",border:"1px solid #0e2040",padding:"6px 8px",marginBottom:2,display:"flex",justifyContent:"space-between",alignItems:"center",borderRadius:1}}>
                            <div>
                              <span style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#c8d8e4"}}>{c.sym} </span>
                              <span style={{fontFamily:"Share Tech Mono,monospace",fontSize:6,color:"#3a5570"}}>{c.name}</span>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontFamily:"Orbitron,monospace",fontSize:9,color:catCol}}>{c.cat==="crypto"?"$":""}{c.price.toLocaleString(undefined,{maximumFractionDigits:c.price>100?2:c.price>1?3:5})}</div>
                              <div style={{fontFamily:"Share Tech Mono,monospace",fontSize:7,color:up?GR:R}}>{up?"▲":"▼"}{Math.abs(chg).toFixed(2)}%</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
                {!pricesLive&&<div style={{fontFamily:"Share Tech Mono,monospace",fontSize:7,color:"#2a4050",textAlign:"center",padding:"8px 0",borderTop:"1px solid #0e2040",marginTop:4}}>Indicative only. Click ⟳ for live data.</div>}
              </div>
            )}
          </div>
        )}
      </div>

      {isMobile&&showPanel&&(
        <div style={{position:"absolute",top:0,left:0,bottom:0,width:"72vw",maxWidth:270,background:"#040912",borderRight:"1px solid #0e2040",zIndex:200,display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderBottom:"1px solid #0e2040"}}>
            <span style={{fontFamily:"Orbitron,monospace",fontSize:8,color:G,letterSpacing:2}}>SUMMIT INTEL</span>
            <div onClick={()=>setShowPanel(false)} style={{color:"#3a5570",cursor:"pointer",fontSize:18}}>×</div>
          </div>
          <div style={{display:"flex",borderBottom:"1px solid #0e2040",flexShrink:0}}>
            {[["xfeed","LIVE",GR],["intel","INTEL",R],["trade","TRD",C],["prices","MKT","#c9a84c"]].map(([id,lbl,col])=>(
              <div key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"7px 2px",textAlign:"center",fontFamily:"Orbitron,monospace",fontSize:6.5,cursor:"pointer",color:tab===id?col:"#3a5570",borderBottom:"2px solid "+(tab===id?col:"transparent")}}>{lbl}</div>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:8}}>
            {tab==="xfeed"&&(
              <div>
                <div onClick={()=>loadFeed(feedTopic)} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"8px",background:"#0a1220",border:"1px solid #0e2040",marginBottom:8,cursor:"pointer",fontFamily:"Orbitron,monospace",fontSize:7,color:feedLoading?"#ff8800":GR,letterSpacing:1}}>
                  <span style={{display:"inline-block",animation:feedLoading?"sr-spin 1s linear infinite":"none"}}>⟳</span>
                  {feedLoading?"FETCHING...":"REFRESH INTEL"}
                </div>
                {liveFeed.slice(0,6).map((item,i)=>{
                  const col=catColors[item.cat]||"#a8c4d4";
                  return(
                    <div key={i} style={{background:"#0a1220",border:"1px solid #0e2040",borderLeft:"3px solid "+col,padding:"7px 8px",marginBottom:3}}>
                      <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:10,color:"#d4eaf8",lineHeight:1.4,marginBottom:3}}>{item.headline}</div>
                      <div style={{display:"flex",justifyContent:"space-between",fontFamily:"Share Tech Mono,monospace",fontSize:6}}>
                        <span style={{color:col}}>{item.cat||"market"}</span>
                        {item.search&&<a href={"https://www.google.com/search?q="+encodeURIComponent(item.search)} target="_blank" rel="noreferrer" style={{color:"#2a6080",textDecoration:"none"}}>verify →</a>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {tab==="intel"&&liveFeed.slice(0,10).map((item,i)=>{
              const col=TC[item.cat]||catColors[item.cat]||"#fff";
              return(<div key={i} style={{borderLeft:"2px solid "+col,padding:"6px 8px",marginBottom:4,background:"#0a1220"}}>
                <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:10,fontWeight:600,color:"#d4eaf8",lineHeight:1.4}}>{item.headline}</div>
                <div style={{fontFamily:"Share Tech Mono,monospace",fontSize:6,color:"#3a5570",marginTop:2}}>{item.source||""} {item.time||"live"}</div>
              </div>);
            })}
            {tab==="prices"&&prices.slice(0,12).map(c=>{
              const chg=(c.price-c.prev)/c.prev*100,up=chg>=0;
              const cc={crypto:"#f7931a",metal:G,commodity:O,defence:"#ff4444"}[c.cat]||C;
              return(<div key={c.sym} style={{background:"#0a1220",border:"1px solid #0e2040",padding:"6px 8px",marginBottom:2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:"Orbitron,monospace",fontSize:8,color:"#c8d8e4"}}>{c.sym}</span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"Orbitron,monospace",fontSize:9,color:cc}}>{c.price.toLocaleString(undefined,{maximumFractionDigits:c.price>100?2:3})}</div>
                  <div style={{fontFamily:"Share Tech Mono,monospace",fontSize:7,color:up?GR:R}}>{up?"▲":"▼"}{Math.abs(chg).toFixed(2)}%</div>
                </div>
              </div>);
            })}
            {tab==="trade"&&TRADE_ROUTES.map((r,i)=>(
              <div key={i} style={{background:"#0a1220",border:"1px solid #0e2040",padding:"6px 8px",marginBottom:3,display:"flex",gap:6,alignItems:"center"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:r.color,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:10,fontWeight:600,color:"#d4eaf8"}}>{r.name}</div>
                  <div style={{fontFamily:"Share Tech Mono,monospace",fontSize:6.5,color:"#6a8a9a"}}>{r.vol}</div>
                </div>
                <div style={{fontFamily:"Orbitron,monospace",fontSize:5.5,color:r.color}}>{r.status}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {isMobile&&showPanel&&<div onClick={()=>setShowPanel(false)} style={{position:"absolute",top:0,right:0,bottom:0,left:"72vw",background:"rgba(0,0,0,0.5)",zIndex:199}}/>}

      {isMobile&&(
        <div style={{height:50,background:"#040912",borderTop:"1px solid #0e2040",display:"flex",flexShrink:0}}>
          {[["xfeed","LIVE",GR],["intel","INTEL",R],["trade","TRADE",C],["prices","MKT","#c9a84c"]].map(([id,lbl,col])=>(
            <div key={id} onClick={()=>{setTab(id);setShowPanel(true);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,cursor:"pointer",background:tab===id?"rgba(0,0,0,0.3)":"transparent"}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:tab===id?col:"#3a5570"}}/>
              <span style={{fontFamily:"Orbitron,monospace",fontSize:6,color:tab===id?col:"#3a5570"}}>{lbl}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("situation-root")).render(<SituationRoom/>);

</script>

</body>
</html>
